<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SingleGoldenRetriever</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="screen active">
        <div class="auth-box">
            <h2>Login</h2>
            <input type="text" id="username-input" placeholder="Enter username (e.g. Nikita, Alice, Bob)...">
            <button onclick="login()">Enter</button>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="sidebar left">
            <h3>My Subscribed Tags</h3>
            <ul id="tags-list"></ul>
        </div>
        
        <div class="main-chat">
            <div id="message-feed"></div>
            <div class="composer">
                <input type="text" id="custom-tags-input" placeholder="Override tags (comma-separated, e.g. alerts, qa)...">
                <input type="text" id="message-input" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div class="sidebar right">
            <h3>Active Users</h3>
            <ul id="online-list"></ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
